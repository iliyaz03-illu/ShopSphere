{% extends "base.html" %}

{% block content %}

<div class="products">

    <div
        style="
            max-width:650px;
            margin:auto;
            background:white;
            padding:50px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,.1);
        "
    >

        <h1 style="color:green;">

            ✅ Payment Successful

        </h1>

        <br>

        <h3>

            Transaction ID

        </h3>

        <h2 style="color:#2563eb;">

            {{ transaction }}

        </h2>

        <br>

        <p>

            Thank you for shopping with ShopSphere.

        </p>

        <br>

        <form
            action="{% url 'place_order' %}"
            method="POST"
        >

            {% csrf_token %}

            <button
                type="submit"
                style="
                    padding:15px 35px;
                    background:#16a34a;
                    color:white;
                    border:none;
                    border-radius:10px;
                    font-size:18px;
                    cursor:pointer;
                "
            >

                Continue

            </button>

        </form>

    </div>

</div>

{% endblock %}
