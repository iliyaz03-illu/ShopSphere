{% extends 'base.html' %}

{% block content %}

<h1>📦 My Orders</h1>

<hr><br>

{% for order in orders %}

<div class="card">

    <h2>{{ order.product.name }}</h2>

    <p><strong>Quantity:</strong> {{ order.quantity }}</p>

    <p><strong>Total:</strong> ₹ {{ order.total_price }}</p>

    <p><strong>Ordered On:</strong> {{ order.ordered_at }}</p>

</div>

<br>

{% empty %}

<h2>No Orders Yet</h2>

{% endfor %}

<br>

<a href="{% url 'home' %}">
    <button>Continue Shopping</button>
</a>

{% endblock %}
