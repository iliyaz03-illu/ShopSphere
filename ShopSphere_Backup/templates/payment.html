{% extends "base.html" %}

{% block content %}

<div class="products">

    <div
        style="
            max-width:650px;
            margin:auto;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,.1);
        "
    >

        <h1 style="text-align:center;color:#2563eb;">

            💳 ShopSphere Secure Payment

        </h1>

        <br>

        <h2 style="text-align:center;">

            Amount to Pay

        </h2>

        <h1
            style="
                text-align:center;
                color:#16a34a;
                font-size:45px;
            "
        >

            ₹ {{ total }}

        </h1>

        <br>

        <hr>

        <br>

        <form method="POST">

            {% csrf_token %}

            <h3>Select Payment Method</h3>

            <br>

            <label>

                <input
                    type="radio"
                    name="payment_method"
                    value="UPI"
                    checked
                >

                📱 UPI

            </label>

            <br><br>

            <label>

                <input
                    type="radio"
                    name="payment_method"
                    value="Card"
                >

                💳 Credit / Debit Card

            </label>

            <br><br>

            <label>

                <input
                    type="radio"
                    name="payment_method"
                    value="Net Banking"
                >

                🏦 Net Banking

            </label>

            <br><br>

            <label>

                <input
                    type="radio"
                    name="payment_method"
                    value="Cash on Delivery"
                >

                💵 Cash on Delivery

            </label>

            <br><br><br>

            <button
                type="submit"
                style="
                    width:100%;
                    padding:15px;
                    background:#2563eb;
                    color:white;
                    border:none;
                    border-radius:10px;
                    font-size:18px;
                    cursor:pointer;
                "
            >

                Proceed Payment

            </button>

        </form>

    </div>

</div>

{% endblock %}
